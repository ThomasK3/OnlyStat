<div id="screen-onboarding" class="screen">
  <div class="onb-wrap">

    <div class="onb-logo">OnlyStát</div>

    <div class="onb-hero">
      <h1 class="onb-title">Vítej. Víš, co za své daně dostáváš?</h1>
      <p class="onb-subtitle">Zadej svůj měsíční příjem a my ti ukážeme, kam tvoje peníze jdou.</p>
    </div>

    <div class="onb-form">
      <label class="onb-label" for="onb-income">Tvůj hrubý měsíční příjem (Kč)</label>
      <input
        class="onb-input"
        id="onb-income"
        type="number"
        inputmode="numeric"
        placeholder="např. 45 000"
        oninput="calcOnboarding()"
      />

      <div class="onb-calc" id="onb-calc">
        <div class="onb-calc-row">
          <span>Tvůj měsíční příspěvek státu:</span>
          <strong id="onb-monthly">–</strong>
        </div>
        <div class="onb-calc-row">
          <span>Ročně:</span>
          <strong id="onb-yearly">–</strong>
        </div>
      </div>
    </div>

    <button class="onb-btn" onclick="finishOnboarding()">
      Začít
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

  </div>
</div>
