<div id="screen-feedback" class="screen">
  <div class="top-bar"><button class="top-bar-back" onclick="goBack()"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button><div class="top-bar-title">Zpětná vazba</div><div class="top-bar-spacer"></div></div>
  <div class="feedback-hero"><div class="feedback-hero-emoji">💬</div><div class="feedback-hero-title">Jak se vám to líbí?</div><div class="feedback-hero-sub">Váš názor nám pomůže udělat aplikaci lepší pro všechny</div></div>
  <div class="feedback-form">
    <div><div class="feedback-question">Jak hodnotíte OnlyStát celkově?</div><div style="margin-top:var(--sp-sm);"><div class="emoji-row"><button class="emoji-btn" onclick="selectEmoji(this)"><span>😠</span><span>Špatné</span></button><button class="emoji-btn" onclick="selectEmoji(this)"><span>😕</span><span>Ušlo</span></button><button class="emoji-btn" onclick="selectEmoji(this)"><span>😐</span><span>OK</span></button><button class="emoji-btn" onclick="selectEmoji(this)"><span>😊</span><span>Dobré</span></button><button class="emoji-btn active" onclick="selectEmoji(this)"><span>🤩</span><span>Skvělé</span></button></div></div></div>
    <div><div class="feedback-question">Co se vám líbilo?</div><div style="margin-top:var(--sp-sm);"><div class="feedback-tags"><button class="feedback-tag active" onclick="toggleTag(this)">Přehlednost</button><button class="feedback-tag active" onclick="toggleTag(this)">Užitečné info</button><button class="feedback-tag" onclick="toggleTag(this)">Jednoduchý průvodce</button><button class="feedback-tag" onclick="toggleTag(this)">Přehled daní</button><button class="feedback-tag" onclick="toggleTag(this)">Projekty poblíž</button><button class="feedback-tag" onclick="toggleTag(this)">Rychlost</button></div></div></div>
    <div><div class="feedback-question">Co bychom mohli zlepšit?</div><textarea class="feedback-textarea" style="margin-top:var(--sp-sm);" placeholder="Napište cokoli — čteme každou zprávu…"></textarea></div>
    <button class="btn-primary" onclick="navigateTo('screen-feedback-done','forward')">Odeslat zpětnou vazbu</button>
  </div>
</div>
