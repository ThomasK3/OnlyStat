<!DOCTYPE html>
<html lang="cs">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<body>
  <div id="app">
    <nav id="bottom-nav">
      <button class="nav-tab active" id="nav-home" onclick="switchTab('screen-home')">

      </button>

      </button>
      <button class="nav-tab" id="nav-profil" onclick="switchTab('screen-profil')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
